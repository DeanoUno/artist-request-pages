<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Request a Song</title>
  <link rel="stylesheet" href="/themes.css">
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
</head>
<body class="default">
  <div class="form-container">
    <div class="logo">
      <img id="artistLogo" src="" alt="Artist Logo" />
    </div>
    <h1 id="artistName">Request a Song</h1>
    <form id="requestForm">
      <label for="name">Your Name (optional)</label>
      <input name="name" id="name" />

      <label for="songSearch">Song</label>
      <input id="songSearch" name="song" placeholder="Start typing a title, artist, or genre..." autocomplete="off" />
      <div id="songWarning" class="invalid-song-warning">Please select a valid song from the list.</div>

      <label for="note">Note for the Artist</label>
      <textarea name="note" id="note" rows="3"></textarea>
      <input type="hidden" name="artistId" id="artistId" />
      <button id="sendBtn" type="submit" disabled>Send Request</button>
    </form>
    <div class="thank-you" id="thankYouMessage">Thank you for your request!</div>
    <div class="debug-log" id="debug"></div>
  </div>

  <script>
    const debug = document.getElementById('debug');
    const log = msg => debug.innerHTML += `<div>${msg}</div>`;

    const params = new URLSearchParams(window.location.search);
    let artistId = params.get('artist_id') || params.get('artist') || 'deano';
    document.getElementById('artistId').value = artistId;
    const configURL = '/.netlify/functions/load-config?artist_id=' + artistId;

    let artist = {}, allSongs = [], userIP = '';
    window.artistReady = false;

    fetch('https://api.ipify.org?format=json')
      .then(r => r.json())
      .then(d => { userIP = d.ip || ''; });

    fetch(configURL)
      .then(r => r.json())
      .then(data => {
        if (!data || !data.artistId) throw new Error("Invalid artist config");
        artist = data;
        window.artistReady = true;
        log('✅ Artist config loaded');
        document.getElementById("artistId").value = artist.artistId;
        document.getElementById("artistName").textContent = artist.artistName;
        if (artist.logoUrl) document.getElementById("artistLogo").src = artist.logoUrl;
        document.getElementById("sendBtn").disabled = false;

        const songListURL = `https://opensheet.elk.sh/${artist.songListSheetId}/Songs`;
        return fetch(songListURL);
      })
      .then(res => res.json())
      .then(rows => {
        allSongs = rows.map(row => ({
          title: row.title || row.Title || '',
          artist: row.artist || row.Artist || '',
          genre: row.genre || row.Genre || ''
        })).filter(song => song.title);

        const searchBox = document.getElementById('songSearch');
        const autoList = document.createElement('ul');
        autoList.id = 'autocompleteList';
        autoList.className = 'autocomplete-list';
        searchBox.parentNode.appendChild(autoList);

        searchBox.addEventListener('input', () => {
          const term = searchBox.value.trim().toLowerCase();
          autoList.innerHTML = '';
          if (!term) return;

          allSongs
            .filter(song =>
              song.title.toLowerCase().includes(term) ||
              song.artist.toLowerCase().includes(term) ||
              song.genre.toLowerCase().includes(term))
            .forEach(song => {
              const li = document.createElement('li');
              li.innerHTML = `
                <div style="font-weight:bold">${song.title}</div>
                <div style="font-size:0.85em; color:#555;">${song.artist} • ${song.genre}</div>
              `.replace(new RegExp(`(${term})`, 'gi'), '<strong>$1</strong>');
              li.addEventListener('click', () => {
                searchBox.value = song.title;
                autoList.innerHTML = '';
              });
              autoList.appendChild(li);
            });
        });

        document.addEventListener('click', e => {
          if (!searchBox.contains(e.target) && !autoList.contains(e.target)) {
            autoList.innerHTML = '';
          }
        });
      })
      .catch(err => {
        log(`❌ Load error: ${err.message}`);
        console.error(err);
      });

    const searchBox = document.getElementById('songSearch');
    const warningBox = document.getElementById('songWarning');

    document.getElementById('requestForm').addEventListener('submit', async e => {
      e.preventDefault();
      if (!window.artistReady) {
        alert("Please wait, the artist information is still loading.");
        return;
      }

      const form = e.target;
      const data = Object.fromEntries(new FormData(form).entries());
      const enteredSong = data.song?.trim().toLowerCase();
      const isValid = allSongs.some(song => song.title.toLowerCase() === enteredSong);

      if (!isValid) {
        warningBox.style.display = 'block';
        document.body.classList.add('invalid');
        return;
      } else {
        warningBox.style.display = 'none';
        document.body.classList.remove('invalid');
      }

      data.ip = userIP;
      data.pushoverToken = artist.pushoverToken;
      data.pushoverUserKey = artist.pushoverUserKey;

      try {
        const response = await fetch('/.netlify/functions/submit-request', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        const result = await response.json();
        log(`✅ Server response: ${JSON.stringify(result)}`);
        form.reset();
        const msg = document.getElementById('thankYouMessage');
        msg.style.display = 'block';
        setTimeout(() => msg.style.display = 'none', 5000);
      } catch (err) {
        log(`❌ Submit error: ${err.message}`);
        console.error(err);
      }
    });
  </script>
</body>
</html>
